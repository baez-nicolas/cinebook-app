version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cinebook-postgres
    environment:
      POSTGRES_DB: cinebook_db
      POSTGRES_USER: cinebook_user
      POSTGRES_PASSWORD: cinebook_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: