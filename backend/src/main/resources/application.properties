# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cinebook_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cinebook_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cinebook_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false
springdoc.swagger-ui.disable-swagger-default-url=true

# JWT Configuration
jwt.secret=mySecretKeyForCinebookAppThatIsLongEnoughForHS256Algorithm
jwt.expiration=86400000

# Timezone para tareas programadas
# spring.task.scheduling.pool.size=2

# FIX: Reducir logging (evitar crash)
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.com.cinebook=INFO
logging.level.root=WARN

# FIX: Desactivar cron temporalmente
spring.task.scheduling.enabled=false

# FIX: Limitar conexiones DB
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

