<div class="register-page">
  <div class="cinema-background">
    <div class="ambient-light ambient-1"></div>
    <div class="ambient-light ambient-2"></div>
    <div class="ambient-light ambient-3"></div>
  </div>

  <div class="register-container">
    <div class="cinema-brand">
      <img src="/logo.png" alt="CineBook Logo" class="brand-logo" />
      <span>CineBook</span>
    </div>
    <div class="register-card">
      <div class="register-header">
        <h1>Crear Cuenta</h1>
        <p>Crea tu cuenta</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="register-form">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">Nombre *</label>
            <input
              id="firstName"
              type="text"
              [(ngModel)]="userData.firstName"
              name="firstName"
              placeholder="Juan"
              required
              [disabled]="loading"
            />
          </div>

          <div class="form-group">
            <label for="lastName">Apellido *</label>
            <input
              id="lastName"
              type="text"
              [(ngModel)]="userData.lastName"
              name="lastName"
              placeholder="Pérez"
              required
              [disabled]="loading"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="userData.email"
            name="email"
            placeholder="tu@email.com"
            required
            [disabled]="loading"
          />
        </div>

        <div class="form-group">
          <label for="phone">Teléfono (opcional)</label>
          <input
            id="phone"
            type="tel"
            [(ngModel)]="userData.phone"
            name="phone"
            placeholder="1234567890"
            [disabled]="loading"
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Contraseña *</label>
            <div class="password-input-wrapper">
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                [(ngModel)]="userData.password"
                name="password"
                placeholder="••••••••"
                required
                [disabled]="loading"
              />
              <button
                type="button"
                class="toggle-password"
                (click)="togglePasswordVisibility()"
                [disabled]="loading"
                [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  @if (showPassword) {
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  } @else {
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                    ></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  }
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirmar *</label>
            <div class="password-input-wrapper">
              <input
                id="confirmPassword"
                [type]="showConfirmPassword ? 'text' : 'password'"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                placeholder="••••••••"
                required
                [disabled]="loading"
              />
              <button
                type="button"
                class="toggle-password"
                (click)="toggleConfirmPasswordVisibility()"
                [disabled]="loading"
                [attr.aria-label]="
                  showConfirmPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'
                "
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  @if (showConfirmPassword) {
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  } @else {
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                    ></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  }
                </svg>
              </button>
            </div>
          </div>
        </div>

        <p class="password-hint">La contraseña debe tener al menos 6 caracteres</p>

        <button type="submit" class="btn-register" [disabled]="loading">
          @if (loading) {
            <span class="spinner"></span>
            Registrando...
          } @else {
            Crear Cuenta
          }
        </button>
      </form>

      <div class="register-footer">
        <p>¿Ya tienes cuenta?</p>
        <a [routerLink]="['/login']" class="link-login">Inicia sesión aquí</a>
      </div>
    </div>
  </div>
</div>
