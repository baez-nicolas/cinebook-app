<div class="login-page">
  <div class="cinema-background">
    <div class="ambient-light ambient-1"></div>
    <div class="ambient-light ambient-2"></div>
    <div class="ambient-light ambient-3"></div>
  </div>

  <div class="login-container">
    <div class="cinema-brand">
      <span class="emoji">🎬</span>
      <span>CineBook</span>
    </div>
    <div class="login-card">
      <div class="login-header">
        <h1>Iniciar Sesión</h1>
        <p>Inicia sesión para continuar</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="credentials.email"
            name="email"
            placeholder="tu@email.com"
            required
            [disabled]="loading"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-input-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="credentials.password"
              name="password"
              placeholder="••••••••"
              required
              [disabled]="loading"
            />
            <button
              type="button"
              class="toggle-password"
              (click)="togglePasswordVisibility()"
              [disabled]="loading"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                @if (showPassword) {
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                } @else {
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  ></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                }
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" [disabled]="loading">
          @if (loading) {
            <span class="spinner"></span>
            Iniciando sesión...
          } @else {
            Iniciar Sesión
          }
        </button>
      </form>

      <div class="login-footer">
        <p>¿No tienes cuenta?</p>
        <a [routerLink]="['/register']" class="link-register">Regístrate aquí</a>
      </div>
    </div>
  </div>
</div>
